# gRPC server configuration
quarkus.grpc.server.port=9090

# Database configuration (uses environment variables)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${MOTTAINAI_DB_URL:jdbc:postgresql://localhost:5432/mottainai}
quarkus.datasource.username=${MOTTAINAI_DB_USER:mottainai}
quarkus.datasource.password=${MOTTAINAI_DB_PASSWORD:mottainai_dev}
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=10

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.mottainai".level=DEBUG
