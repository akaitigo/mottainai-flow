# Test datasource: H2 in-memory with PostgreSQL compatibility mode
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:mottainai_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'classpath:h2-init.sql'
quarkus.datasource.username=sa
quarkus.datasource.password=

# Logging for tests
quarkus.log.level=WARN
quarkus.log.category."com.mottainai".level=DEBUG
