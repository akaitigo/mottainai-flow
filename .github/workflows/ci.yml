name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  proto:
    name: Proto (buf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: buf lint
        run: buf lint

      - name: buf format check
        run: buf format --diff --exit-code

      - name: buf breaking
        if: github.event_name == 'pull_request'
        run: buf breaking --against '.git#branch=origin/main'

  backend:
    name: Backend (Kotlin/Quarkus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Format check
        working-directory: backend
        run: ./gradlew formatKotlin lintKotlin

      - name: Detekt
        working-directory: backend
        run: ./gradlew detekt

      - name: Test
        working-directory: backend
        run: ./gradlew test

      - name: Build
        working-directory: backend
        run: ./gradlew build

  routing:
    name: Routing (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: routing/go.sum

      - name: Install tools
        run: |
          go install mvdan.cc/gofumpt@latest
          go install golang.org/x/tools/cmd/goimports@latest

      - name: Format check
        working-directory: routing
        run: |
          gofumpt -l . | tee /tmp/fmt-diff
          test ! -s /tmp/fmt-diff || { echo "gofumpt: unformatted files found"; exit 1; }

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: routing

      - name: Test
        working-directory: routing
        run: go test -v -race -count=1 ./...

      - name: Build
        working-directory: routing
        run: go build -ldflags "-s -w" ./...

  frontend:
    name: Frontend (TypeScript/React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npx oxlint . && npx biome check .

      - name: Format check
        working-directory: frontend
        run: npx biome format .

      - name: Test
        working-directory: frontend
        run: npx vitest run

      - name: Type check
        working-directory: frontend
        run: npx tsc
